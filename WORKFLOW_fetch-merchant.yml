name: 鎶撳彇杩滆鍟嗕汉鏁版嵁

on:
  schedule:
    # 姣?5鍒嗛挓杩愯涓€娆★紝鍖椾含鏃堕棿 08:00-24:00 (UTC 00:00-16:00)
    - cron: '*/15 0-16 * * *'
  workflow_dispatch:
    # 鏀寔鎵嬪姩瑙﹀彂

concurrency:
  group: merchant-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 妫€鍑轰唬鐮?        uses: actions/checkout@v4

      - name: 瀹夎 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 瀹夎渚濊禆
        run: pip install -r requirements.txt

      - name: 鎶撳彇杩滆鍟嗕汉鏁版嵁
        run: python fetch_merchant.py

      - name: 鎻愪氦鏁版嵁鏇存柊
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 鍙彁浜?data/merchant.json 鐨勫彉鏇?          git add data/merchant.json

          if git diff --staged --quiet; then
            echo "鏁版嵁鏃犲彉鍖栵紝璺宠繃鎻愪氦"
          else
            NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
            git commit -m "馃搳 鏇存柊杩滆鍟嗕汉鏁版嵁 [$NOW CST]"
            git push
            echo "鏁版嵁宸叉洿鏂板苟鎺ㄩ€?
          fi
