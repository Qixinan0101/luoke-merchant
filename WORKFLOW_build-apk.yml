name: 鏋勫缓杩滆鍟嗕汉 APK

on:
  push:
  workflow_dispatch:  # 鏀寔鎵嬪姩瑙﹀彂

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 妫€鍑轰唬鐮?        uses: actions/checkout@v4

      - name: 瀹夎 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 瀹夎 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'

      - name: 鏋勫缓 Debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: 涓婁紶 APK 浜х墿
        uses: actions/upload-artifact@v4
        with:
          name: 杩滆鍟嗕汉-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
